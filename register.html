<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 400px;">
    <h3 class="text-center mb-3">Register</h3>

    <form onsubmit="register(event)">
        <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name">
        <input type="email" id="regEmail" class="form-control mb-3" placeholder="Enter Email">
        <input type="password" id="regPassword" class="form-control mb-3" placeholder="Enter Password">
        <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password">

        <button class="btn btn-success w-100">Register</button>
    </form>

    <div class="text-center mt-3">
        <a href="index.html">Back to Login</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
